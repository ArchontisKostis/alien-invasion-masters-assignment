name: Release Greenfoot Game

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Pure-Java Greenfoot installer
        run: |
          set -euo pipefail

          mkdir -p lib

          echo "Downloading Pure Java Greenfoot installer..."
          curl -L --retry 3 \
            https://www.greenfoot.org/download/files/Greenfoot-generic-371.jar \
            -o greenfoot-generic.jar

          # sanity check: ensure not a small HTML error response
          if [ ! -f greenfoot-generic.jar ] || [ $(stat -c%s greenfoot-generic.jar) -lt 10000 ]; then
            echo "Greenfoot installer download failed or file too small (possible HTML error)." >&2
            echo "Downloaded file preview:" >&2
            head -c 2048 greenfoot-generic.jar || true
            exit 1
          fi

          echo "Unpacking installer jar..."
          mkdir -p greenfoot
          unzip -q greenfoot-generic.jar -d greenfoot || true

          echo "Searching for runtime jars and copying to lib/..."
          find greenfoot -name "greenfoot.jar" -exec cp {} lib/ \; || true
          find greenfoot -name "bluejcore.jar" -exec cp {} lib/ \; || true
          # if jars not found inside generic installer, also accept the installer jar itself
          # If no runtime jars were copied, try extracting nested jars from the installer
          if [ -z "$(ls lib/*.jar 2>/dev/null)" ]; then
            echo "No runtime jars found in greenfoot unpack; extracting nested jars from installer..."
            unzip -l greenfoot-generic.jar | awk '{print $4}' | grep '\.jar$' | while read -r inner; do
              if [ -n "$inner" ]; then
                echo "Extracting $inner to lib/"
                unzip -p greenfoot-generic.jar "$inner" > "lib/$(basename "$inner")" || true
              fi
            done
          fi

          # final fallback: if still no jars, copy installer as greenfoot.jar
          if [ -z "$(ls lib/*.jar 2>/dev/null)" ]; then
            echo "No nested jars extracted; copying installer as fallback lib/greenfoot.jar"
            cp greenfoot-generic.jar lib/greenfoot.jar || true
          fi

      - name: Log Greenfoot download
        run: |
          echo "== greenfoot-generic.jar metadata =="
          if [ -f greenfoot-generic.jar ]; then
            stat -c '%n %s %y' greenfoot-generic.jar || true
            sha256sum greenfoot-generic.jar || true
            file greenfoot-generic.jar || true
            echo "== listing greenfoot-generic.jar contents (top 200 lines) =="
            unzip -l greenfoot-generic.jar | sed -n '1,200p' || true
          else
            echo "greenfoot-generic.jar not found" >&2
          fi
          echo "== lib/*.jar files =="
          ls -la lib || true
          for j in lib/*.jar; do
            if [ -f "$j" ]; then
              echo "---- $j ----"
              jar -tf "$j" | sed -n '1,200p' || true
            fi
          done

      - name: Probe Greenfoot classes
        run: |
          echo "Looking for greenfoot classes (World.class) inside lib jars..."
          for j in lib/*.jar; do
            if [ -f "$j" ]; then
              echo "---- Inspecting $j ----"
              jar -tf "$j" | grep 'World.class' || true
              jar -tf "$j" | grep '^lib/greenfoot' | sed -n '1,200p' || true
            fi
          done

      - name: Repackage Greenfoot runtime into lib/greenfoot.jar
        run: |
          set -euo pipefail
          if [ -f lib/greenfoot-dist.jar ]; then
            echo "Extracting lib/greenfoot.jar from lib/greenfoot-dist.jar..."
            if unzip -l lib/greenfoot-dist.jar | grep -q 'lib/greenfoot\.jar'; then
              unzip -p lib/greenfoot-dist.jar lib/greenfoot.jar > lib/greenfoot.jar
              echo "Created lib/greenfoot.jar ($(stat -c%s lib/greenfoot.jar) bytes)"
            else
              echo "lib/greenfoot.jar entry not found inside greenfoot-dist.jar" >&2
              exit 1
            fi
          else
            echo "lib/greenfoot-dist.jar not present; skipping repackaging"
          fi

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install semantic-release
        run: |
          npm install -g semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            conventional-changelog-conventionalcommits

      - name: Log npm global packages
        run: |
          echo "== npm global root and bin =="
          npm root -g || true
          npm bin -g || true
          echo "== npm global packages (depth=0) =="
          npm list -g --depth=0 || true


      - name: Semantic Version Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semantic-release

      - name: Get release version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create build directories
        run: |
          mkdir -p build/classes
          mkdir -p dist

      - name: Debug lib contents
        run: |
          echo "== lib directory =="
          ls -la lib || true
          echo "== java/javaac versions =="
          java -version || true
          javac -version || true
          echo "== Jar contents preview =="
          for j in lib/*.jar; do
            if [ -f "$j" ]; then
              echo "---- $j ----"
              jar -tf "$j" | head -n 50 || true
            fi
          done

      - name: Compile sources
        run: |
          find game -name "*.java" > sources.txt

          javac \
            -cp "lib/*" \
            -d build/classes \
            @sources.txt

      - name: Copy assets
        run: |
          cp -r game/images build/classes/ || true
          cp -r game/sounds build/classes/ || true
          cp -r game/fonts  build/classes/ || true

      - name: Bundle Greenfoot runtime
        run: |
          set -euo pipefail
          # Unzip the extracted greenfoot.jar (API + export classes) into build/classes
          if [ -f lib/greenfoot.jar ]; then
            unzip -q lib/greenfoot.jar -d build/classes/ -x 'META-INF/*' || true
            echo "Extracted lib/greenfoot.jar into build/classes"
          fi
          # Also copy the standalone runtime classes from greenfoot-dist.jar;
          # they live at lib/greenfoot/standalone/ inside the dist jar and map
          # to the greenfoot.* package when that prefix is stripped.
          if [ -f lib/greenfoot-dist.jar ]; then
            mkdir -p tmp_standalone
            unzip -q lib/greenfoot-dist.jar 'lib/greenfoot/standalone/*' -d tmp_standalone || true
            if [ -d tmp_standalone/lib/greenfoot/standalone ]; then
              cp -r tmp_standalone/lib/greenfoot/standalone/. build/classes/
              echo "Copied standalone runtime classes"
            fi
            rm -rf tmp_standalone
          fi

      - name: Create standalone properties
        run: |
          echo "world.class.name=IntroWorld" > build/classes/standalone.properties

      - name: Create manifest
        run: |
          echo "Main-Class: greenfoot.export.GreenfootScenarioApplication" > manifest.txt

      - name: Build JAR
        run: |
          jar cfm \
            dist/game-${{ steps.version.outputs.version }}.jar \
            manifest.txt \
            -C build/classes .

      - name: Upload Release Artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: dist/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}